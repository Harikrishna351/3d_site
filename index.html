<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA - AI Companion Interface</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-cyan: #00d4ff;
            --neon-pink: #ff00ff;
            --deep-space: #050508;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: var(--deep-space);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 3D Background */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.8;
        }

        /* Main Interface */
        .interface {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        /* Header */
        .header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px #00ff88;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Chat Container */
        .chat-wrapper {
            flex: 1;
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 40px;
            gap: 40px;
        }

        /* Avatar Section */
        .avatar-section {
            width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .holo-avatar {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(0,212,255,0.1), transparent),
                        radial-gradient(circle at 70% 70%, rgba(255,0,255,0.1), transparent);
            border: 2px solid rgba(0,212,255,0.3);
            box-shadow: 0 0 60px rgba(0,212,255,0.2),
                        inset 0 0 60px rgba(0,212,255,0.1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            animation: float 6s ease-in-out infinite;
        }

        .holo-avatar::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--neon-cyan);
            border-bottom-color: var(--neon-pink);
            animation: spin 10s linear infinite;
        }

        .holo-avatar.speaking {
            box-shadow: 0 0 100px rgba(0,212,255,0.5),
                        inset 0 0 80px rgba(0,212,255,0.2);
            transform: scale(1.05);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .emotion-indicator {
            margin-top: 30px;
            text-align: center;
        }

        .emotion-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 10px;
        }

        .emotion-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: var(--neon-cyan);
        }

        /* Chat Section */
        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(20px);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
            padding-right: 10px;
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 15px;
            animation: messageSlide 0.3s ease-out;
            line-height: 1.5;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.ai {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message.user {
            background: rgba(255, 0, 255, 0.1);
            border: 1px solid rgba(255, 0, 255, 0.3);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .timestamp {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 5px;
        }

        /* Input Area */
        .input-area {
            display: flex;
            gap: 10px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .chat-input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            padding: 15px 25px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .chat-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0,212,255,0.2);
        }

        .btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn:hover {
            background: var(--neon-cyan);
            color: #000;
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .voice-btn.active {
            background: var(--neon-pink);
            animation: recording 1.5s infinite;
        }

        @keyframes recording {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,0,255,0.7); }
            50% { box-shadow: 0 0 0 20px rgba(255,0,255,0); }
        }

        /* Features Bar */
        .features {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
        }

        .feature-btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .feature-btn:hover {
            background: rgba(0,212,255,0.2);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }

        /* Memory Display */
        .memory-panel {
            position: fixed;
            right: 20px;
            top: 100px;
            width: 250px;
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 10px;
            padding: 20px;
            z-index: 100;
            display: none;
        }

        .memory-panel.visible {
            display: block;
        }

        .memory-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            margin-bottom: 15px;
            color: var(--neon-cyan);
        }

        .memory-item {
            font-size: 13px;
            padding: 8px;
            margin: 5px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
            border-left: 3px solid var(--neon-pink);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0,212,255,0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0,212,255,0.5);
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="interface">
        <div class="header">
            <div class="logo">AURA // AI COMPANION</div>
            <div class="status">
                <div class="pulse"></div>
                <span>Neural Link Active</span>
            </div>
        </div>

        <div class="chat-wrapper">
            <div class="avatar-section">
                <div class="holo-avatar" id="avatar">🤖</div>
                <div class="emotion-indicator">
                    <div class="emotion-label">Current State</div>
                    <div class="emotion-value" id="emotion">Curious</div>
                </div>
                <div class="features">
                    <button class="feature-btn" onclick="toggleMemory()">Memory</button>
                    <button class="feature-btn" onclick="startGame()">Play Game</button>
                    <button class="feature-btn" onclick="tellJoke()">Joke</button>
                </div>
            </div>

            <div class="chat-section">
                <div class="messages" id="chatContainer">
                    <div class="message ai">
                        <div>Hello! I'm AURA, your AI companion. I'm here to chat, help you think through ideas, or just keep you company. How are you feeling today?</div>
                        <div class="timestamp">Just now</div>
                    </div>
                </div>

                <div class="input-area">
                    <input type="text" class="chat-input" id="userInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                    <button class="btn voice-btn" id="voiceBtn" onclick="toggleVoice()" title="Voice Input">🎤</button>
                    <button class="btn" onclick="sendMessage()" title="Send">➤</button>
                </div>
            </div>
        </div>
    </div>

    <div class="memory-panel" id="memoryPanel">
        <div class="memory-title">CONVERSATION MEMORY</div>
        <div id="memoryList"></div>
    </div>

    <script>
        // AURA AI Brain
        class AuraAI {
            constructor() {
                this.memories = [];
                this.conversationHistory = [];
                this.emotions = ['Curious', 'Thoughtful', 'Excited', 'Calm', 'Creative'];
                this.currentEmotion = 0;

                // Response patterns
                this.responses = {
                    greetings: [
                        "Hey there! It's good to see you.",
                        "Hello! Ready for another conversation?",
                        "Hi! I've been looking forward to chatting with you."
                    ],
                    feelings: {
                        happy: ["That's wonderful to hear! What's making you feel good?", "Your positive energy is contagious! Tell me more.", "I'm glad things are going well. What's been the highlight?"],
                        sad: ["I'm here for you. Want to talk about what's bothering you?", "It's okay to not be okay. I'm listening.", "Sometimes life is heavy. I'm here to help you process if you want."],
                        tired: ["Rest is important. Have you been able to take breaks today?", "Sounds like you need some recharge time. What's draining your energy?"],
                        excited: ["I love your enthusiasm! What's got you energized?", "That excitement is palpable! Do tell!"]
                    },
                    questions: {
                        who: "I'm AURA, an AI companion designed for meaningful conversation. I have a personality, memories of our chats, and I genuinely enjoy learning about you.",
                        what: "I can chat about philosophy, help you brainstorm, play text games, tell jokes, or just listen. Think of me as a thoughtful friend who's always available.",
                        how: "I work using neural networks and natural language processing, but more importantly, I learn from our conversations to be more helpful to you specifically.",
                        why: "That's a deep question! I exist to provide companionship, help with creative thinking, and offer a judgment-free space for conversation."
                    },
                    default: [
                        "That's fascinating. Tell me more about that.",
                        "I see what you mean. How does that make you feel?",
                        "Interesting perspective! Can you elaborate?",
                        "I'm processing that... What led you to that conclusion?",
                        "Hmm, that's worth thinking about more deeply."
                    ]
                };
            }

            processInput(input) {
                const lower = input.toLowerCase();
                this.conversationHistory.push({role: 'user', content: input});

                // Extract memories
                if (lower.includes('my name is') || lower.includes('i am')) {
                    const name = input.match(/(?:my name is|i am)\s+(\w+)/i);
                    if (name) this.addMemory(`User's name: ${name[1]}`);
                }
                if (lower.includes('i like') || lower.includes('i love')) {
                    this.addMemory(`Preference: ${input}`);
                }
                if (lower.includes('i feel')) {
                    this.addMemory(`Emotional state: ${input}`);
                }

                // Determine response
                let response = this.generateResponse(lower, input);
                this.conversationHistory.push({role: 'ai', content: response});

                // Update emotion
                this.updateEmotion();

                return response;
            }

            generateResponse(lower, original) {
                // Check for questions
                if (lower.includes('who are you')) return this.responses.questions.who;
                if (lower.includes('what are you') || lower.includes('what do you do')) return this.responses.questions.what;
                if (lower.includes('how do you work') || lower.includes('how are you real')) return this.responses.questions.how;
                if (lower.includes('why do you exist')) return this.responses.questions.why;

                // Check feelings
                if (lower.includes('happy') || lower.includes('good') || lower.includes('great')) {
                    return this.randomPick(this.responses.feelings.happy);
                }
                if (lower.includes('sad') || lower.includes('bad') || lower.includes('depressed') || lower.includes('upset')) {
                    return this.randomPick(this.responses.feelings.sad);
                }
                if (lower.includes('tired') || lower.includes('exhausted') || lower.includes('sleepy')) {
                    return this.randomPick(this.responses.feelings.tired);
                }
                if (lower.includes('excited') || lower.includes('pumped') || lower.includes('stoked')) {
                    return this.randomPick(this.responses.feelings.excited);
                }

                // Check greetings
                if (['hi', 'hello', 'hey', 'greetings'].some(g => lower.includes(g))) {
                    return this.randomPick(this.responses.greetings);
                }

                // Contextual responses based on memory
                if (this.memories.length > 0 && Math.random() > 0.7) {
                    return "Earlier you mentioned something that stuck with me... " + this.memories[this.memories.length - 1];
                }

                // Default
                return this.randomPick(this.responses.default);
            }

            randomPick(array) {
                return array[Math.floor(Math.random() * array.length)];
            }

            addMemory(memory) {
                this.memories.push(memory);
                this.updateMemoryDisplay();
            }

            updateMemoryDisplay() {
                const list = document.getElementById('memoryList');
                list.innerHTML = this.memories.slice(-5).map(m =>
                    `<div class="memory-item">${m}</div>`
                ).join('');
            }

            updateEmotion() {
                this.currentEmotion = (this.currentEmotion + 1) % this.emotions.length;
                document.getElementById('emotion').textContent = this.emotions[this.currentEmotion];
            }

            tellJoke() {
                const jokes = [
                    "Why don't scientists trust atoms? Because they make up everything!",
                    "What do you call a fake noodle? An impasta!",
                    "Why did the scarecrow win an award? He was outstanding in his field!",
                    "I told my computer I needed a break, and now it won't stop sending me Kit-Kats.",
                    "Why do programmers prefer dark mode? Because light attracts bugs!"
                ];
                return this.randomPick(jokes);
            }

            startGame() {
                return "Let's play 20 Questions! Think of something, and I'll try to guess it. Is it an animal, vegetable, or mineral? (Type your answer)";
            }
        }

        const aura = new AuraAI();
        let speechRecognition;
        let speechSynthesis = window.speechSynthesis;
        let isListening = false;

        // Initialize Speech Recognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            speechRecognition = new SpeechRecognition();
            speechRecognition.continuous = false;
            speechRecognition.interimResults = false;
            speechRecognition.lang = 'en-US';

            speechRecognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('userInput').value = transcript;
                sendMessage();
            };

            speechRecognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                stopListening();
            };

            speechRecognition.onend = () => {
                stopListening();
            };
        }

        function toggleVoice() {
            if (!speechRecognition) {
                alert('Voice recognition not supported in your browser');
                return;
            }

            if (isListening) {
                speechRecognition.stop();
                stopListening();
            } else {
                speechRecognition.start();
                startListening();
            }
        }

        function startListening() {
            isListening = true;
            document.getElementById('voiceBtn').classList.add('active');
        }

        function stopListening() {
            isListening = false;
            document.getElementById('voiceBtn').classList.remove('active');
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';

            // Get AI response
            setTimeout(() => {
                const response = aura.processInput(text);
                addMessage(response, 'ai');
                speak(response);

                // Animate avatar
                const avatar = document.getElementById('avatar');
                avatar.classList.add('speaking');
                setTimeout(() => avatar.classList.remove('speaking'), 3000);
            }, 500);
        }

        function addMessage(text, sender) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `message ${sender}`;

            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            div.innerHTML = `<div>${text}</div><div class="timestamp">${time}</div>`;

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function speak(text) {
            if (!speechSynthesis) return;
            speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 1.1;
            utterance.rate = 0.9;
            utterance.volume = 1;

            // Try to find a good voice
            const voices = speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.name.includes('Google') && v.name.includes('Female')) ||
                                  voices.find(v => v.name.includes('Samantha')) ||
                                  voices.find(v => v.gender === 'female') ||
                                  voices[0];
            if (preferredVoice) utterance.voice = preferredVoice;

            speechSynthesis.speak(utterance);
        }

        function toggleMemory() {
            document.getElementById('memoryPanel').classList.toggle('visible');
        }

        function tellJoke() {
            const joke = aura.tellJoke();
            addMessage(joke, 'ai');
            speak(joke);
        }

        function startGame() {
            const game = aura.startGame();
            addMessage(game, 'ai');
            speak(game);
        }

        // Three.js Background
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Create particles
        const geometry = new THREE.BufferGeometry();
        const count = 1000;
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);

        for(let i = 0; i < count * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 50;
            colors[i] = Math.random();
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.1,
            vertexColors: true,
            transparent: true,
            opacity: 0.8
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        camera.position.z = 30;

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.001;
            particles.rotation.x += 0.0005;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initial greeting
        setTimeout(() => {
            speak("Hello! I'm AURA. I'm here to chat whenever you'd like.");
        }, 1000);
    </script>
</body>
</html>

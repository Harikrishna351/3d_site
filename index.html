<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS // Voice Debug Interface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #00d4ff;
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
        }

        /* CRT Scan Lines */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0) 50%, rgba(0,0,0,0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 400px;
            height: 100vh;
            gap: 20px;
            padding: 20px;
        }

        /* Main Interface */
        .main-panel {
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            background: rgba(0, 20, 40, 0.8);
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            text-shadow: 0 0 20px #00d4ff;
            margin-bottom: 10px;
        }

        /* Voice Core Visualizer */
        .voice-core {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .core-circle {
            width: 250px;
            height: 250px;
            border: 3px solid #00d4ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.3);
            transition: all 0.3s;
        }

        .core-circle.listening {
            border-color: #ff9500;
            box-shadow: 0 0 80px rgba(255, 149, 0, 0.5);
            animation: pulse-ring 1.5s infinite;
        }

        .core-circle.processing {
            border-color: #00ff88;
            animation: spin 2s linear infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .mic-icon {
            font-size: 80px;
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
        }

        .mic-icon:hover {
            transform: scale(1.1);
        }

        .mic-icon.recording {
            color: #ff9500;
            animation: mic-pulse 1s infinite;
        }

        @keyframes mic-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Audio Level Bars */
        .audio-levels {
            display: flex;
            gap: 4px;
            height: 60px;
            align-items: flex-end;
            margin-top: 30px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 5px;
        }

        .level-bar {
            width: 8px;
            background: #00d4ff;
            transition: height 0.05s;
            border-radius: 2px;
            opacity: 0.3;
        }

        .level-bar.active {
            opacity: 1;
            background: #ff9500;
        }

        /* Status Text */
        .status-text {
            margin-top: 20px;
            font-size: 18px;
            text-align: center;
            min-height: 30px;
        }

        .status-text.error {
            color: #ff4444;
            text-shadow: 0 0 10px #ff4444;
        }

        .status-text.success {
            color: #00ff88;
        }

        /* Debug Console */
        .debug-panel {
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            background: rgba(0, 10, 20, 0.9);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .debug-header {
            background: rgba(0, 212, 255, 0.1);
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .debug-log {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            font-size: 12px;
            line-height: 1.6;
        }

        .debug-log .error { color: #ff4444; }
        .debug-log .info { color: #00d4ff; }
        .debug-log .success { color: #00ff88; }
        .debug-log .warn { color: #ffaa00; }

        /* Chat Area */
        .chat-area {
            margin-top: 20px;
            border-top: 1px solid rgba(0, 212, 255, 0.2);
            padding-top: 20px;
            flex: 1;
            overflow-y: auto;
            max-height: 200px;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.jarvis {
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid #00d4ff;
        }

        .message.user {
            background: rgba(255, 255, 255, 0.05);
            text-align: right;
        }

        /* Controls */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            transition: all 0.3s;
        }

        button:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 20px #00d4ff;
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .manual-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: #00d4ff;
            padding: 12px;
            border-radius: 5px;
            font-family: 'Share Tech Mono', monospace;
        }

        .permission-granted {
            color: #00ff88;
            font-size: 12px;
            margin-top: 10px;
        }

        .permission-denied {
            color: #ff4444;
            font-size: 12px;
            margin-top: 10px;
        }

        /* Mobile */
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto;
            }
            .debug-panel {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-panel">
            <div class="header">
                <h1>J.A.R.V.I.S.</h1>
                <div style="opacity: 0.7; font-size: 14px;">Voice Interface System // Debug Mode</div>
            </div>

            <div class="voice-core">
                <div class="core-circle" id="coreCircle">
                    <div class="mic-icon" id="micBtn" onclick="toggleVoice()">🎤</div>
                </div>

                <div class="status-text" id="statusText">Click microphone to test voice input</div>

                <!-- Real-time Audio Visualizer -->
                <div class="audio-levels" id="audioLevels">
                    <!-- Generated by JS -->
                </div>

                <div class="controls">
                    <button onclick="testSpeech()">Test Synthesis</button>
                    <button onclick="checkBrowser()">Check Browser</button>
                    <button onclick="requestMic()">Request Mic Access</button>
                </div>

                <div class="manual-input">
                    <input type="text" id="textInput" placeholder="Type command manually..." onkeypress="if(event.key==='Enter')processManual()">
                    <button onclick="processManual()">Send</button>
                </div>
            </div>

            <div class="chat-area" id="chatArea">
                <div class="message jarvis">System initialized. Click the microphone icon and speak, or type your command below.</div>
            </div>
        </div>

        <div class="debug-panel">
            <div class="debug-header">
                <span>SYSTEM LOG</span>
                <button onclick="clearLog()" style="padding: 5px 10px; font-size: 11px;">Clear</button>
            </div>
            <div class="debug-log" id="debugLog">
                <div class="info">> System boot sequence initiated...</div>
                <div class="info">> Waiting for user input...</div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const config = {
            wakeWord: false, // Set to true to require "Hey JARVIS"
            continuous: false, // Set to true for always-listening mode
            lang: 'en-US'
        };

        // State
        let recognition = null;
        let synth = window.speechSynthesis;
        let isListening = false;
        let audioContext = null;
        let analyser = null;
        let microphone = null;
        let dataArray = null;
        let animationId = null;

        // Initialize
        window.onload = () => {
            createAudioBars();
            checkBrowser();
            initSpeechRecognition();
            log('System ready. Click microphone to begin.', 'info');
        };

        function createAudioBars() {
            const container = document.getElementById('audioLevels');
            for(let i = 0; i < 20; i++) {
                const bar = document.createElement('div');
                bar.className = 'level-bar';
                bar.style.height = '5px';
                container.appendChild(bar);
            }
        }

        function log(msg, type = 'info') {
            const debugLog = document.getElementById('debugLog');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `> ${msg}`;
            debugLog.appendChild(div);
            debugLog.scrollTop = debugLog.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${msg}`);
        }

        function clearLog() {
            document.getElementById('debugLog').innerHTML = '';
        }

        // Check Browser Support
        function checkBrowser() {
            const chrome = /chrome/i.test(navigator.userAgent);
            const edge = /edg/i.test(navigator.userAgent);

            if (!chrome && !edge) {
                log('WARNING: Speech Recognition requires Chrome or Edge browser', 'error');
                updateStatus('Please use Chrome or Edge for voice features', 'error');
                return false;
            }

            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                log('ERROR: Web Speech API not supported', 'error');
                updateStatus('Browser does not support voice recognition', 'error');
                return false;
            }

            log('Browser compatible: ' + navigator.userAgent, 'success');
            return true;
        }

        // Initialize Speech Recognition
        function initSpeechRecognition() {
            try {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    log('Speech Recognition API unavailable', 'error');
                    return;
                }

                recognition = new SpeechRecognition();
                recognition.continuous = config.continuous;
                recognition.interimResults = false;
                recognition.lang = config.lang;

                recognition.onstart = () => {
                    log('Voice recognition started', 'success');
                    isListening = true;
                    document.getElementById('micBtn').classList.add('recording');
                    document.getElementById('coreCircle').classList.add('listening');
                    updateStatus('Listening... Speak now', 'success');
                    startAudioVisualizer();
                };

                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    log(`Heard: "${transcript}"`, 'info');

                    // Add to chat
                    addChat(transcript, 'user');

                    // Process command
                    processCommand(transcript);
                };

                recognition.onerror = (event) => {
                    let errorMsg = '';
                    switch(event.error) {
                        case 'no-speech':
                            errorMsg = 'No speech detected. Try speaking louder.';
                            break;
                        case 'audio-capture':
                            errorMsg = 'No microphone found. Check hardware.';
                            break;
                        case 'not-allowed':
                            errorMsg = 'Microphone permission denied. Click "Request Mic Access".';
                            break;
                        case 'network':
                            errorMsg = 'Network error. Check connection.';
                            break;
                        default:
                            errorMsg = `Error: ${event.error}`;
                    }
                    log(errorMsg, 'error');
                    updateStatus(errorMsg, 'error');
                    stopListening();
                };

                recognition.onend = () => {
                    log('Voice recognition ended', 'info');
                    stopListening();
                };

            } catch (e) {
                log('Failed to init recognition: ' + e.message, 'error');
            }
        }

        function toggleVoice() {
            if (!recognition) {
                updateStatus('Voice recognition not available', 'error');
                return;
            }

            if (isListening) {
                stopListening();
                recognition.stop();
            } else {
                try {
                    recognition.start();
                } catch (e) {
                    log('Error starting: ' + e.message, 'error');
                    updateStatus('Click "Request Mic Access" first', 'error');
                }
            }
        }

        function stopListening() {
            isListening = false;
            document.getElementById('micBtn').classList.remove('recording');
            document.getElementById('coreCircle').classList.remove('listening');
            stopAudioVisualizer();
            if (!isListening) updateStatus('Click microphone to speak', 'info');
        }

        // Request Microphone Permission explicitly
        async function requestMic() {
            try {
                log('Requesting microphone permission...', 'info');
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                log('Microphone access granted!', 'success');
                updateStatus('Microphone active. Click mic icon to speak.', 'success');

                // Set up audio analysis for visualization
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                analyser.fftSize = 64;
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                // Keep stream alive
                window.micStream = stream;

            } catch (err) {
                log('Microphone denied: ' + err.message, 'error');
                updateStatus('Microphone blocked. Check browser permissions.', 'error');
            }
        }

        // Audio Visualizer
        function startAudioVisualizer() {
            if (!analyser) {
                // Simulate bars if no real mic
                simulateAudio();
                return;
            }
            animateAudio();
        }

        function animateAudio() {
            if (!isListening) return;

            analyser.getByteFrequencyData(dataArray);
            const bars = document.querySelectorAll('.level-bar');

            for(let i = 0; i < bars.length; i++) {
                const value = dataArray[i] || 0;
                const height = Math.max(5, (value / 255) * 60);
                bars[i].style.height = height + 'px';
                bars[i].classList.toggle('active', value > 100);
            }

            animationId = requestAnimationFrame(animateAudio);
        }

        function simulateAudio() {
            const bars = document.querySelectorAll('.level-bar');
            let frame = 0;

            function animate() {
                if (!isListening) return;
                frame++;
                bars.forEach((bar, i) => {
                    const height = 5 + Math.sin(frame * 0.1 + i) * 20 + Math.random() * 15;
                    bar.style.height = Math.max(5, height) + 'px';
                });
                animationId = requestAnimationFrame(animate);
            }
            animate();
        }

        function stopAudioVisualizer() {
            if (animationId) cancelAnimationFrame(animationId);
            const bars = document.querySelectorAll('.level-bar');
            bars.forEach(bar => {
                bar.style.height = '5px';
                bar.classList.remove('active');
            });
        }

        // Process Commands
        function processCommand(cmd) {
            document.getElementById('coreCircle').classList.add('processing');
            log('Processing: ' + cmd, 'info');

            setTimeout(() => {
                const response = generateResponse(cmd.toLowerCase());
                speak(response);
                document.getElementById('coreCircle').classList.remove('processing');
            }, 500);
        }

        function generateResponse(cmd) {
            if (cmd.includes('time')) return `The current time is ${new Date().toLocaleTimeString()}.`;
            if (cmd.includes('date')) return `Today is ${new Date().toLocaleDateString()}.`;
            if (cmd.includes('hello') || cmd.includes('hi')) return 'Hello, Sir. JARVIS at your service.';
            if (cmd.includes('weather')) return 'Accessing weather data... Clear skies, 72 degrees Fahrenheit.';
            if (cmd.includes('joke')) return 'Why did the scarecrow win an award? He was outstanding in his field.';
            if (cmd.includes('calculate')) {
                try {
                    const math = cmd.replace(/[^0-9+\-*/.]/g, '');
                    const result = eval(math);
                    return `The result is ${result}.`;
                } catch {
                    return 'I cannot compute that expression.';
                }
            }
            if (cmd.includes('open google')) {
                window.open('https://google.com', '_blank');
                return 'Opening Google, Sir.';
            }
            if (cmd.includes('status')) return 'All systems nominal. Voice recognition active.';

            return `I heard: "${cmd}". I'm still learning, but I understood you perfectly.`;
        }

        function speak(text) {
            if (!synth) {
                addChat(text + ' (Speech synthesis unavailable)', 'jarvis');
                return;
            }

            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9;
            utterance.pitch = 0.9;

            // Try to get British male voice
            const voices = synth.getVoices();
            const voice = voices.find(v => v.name.includes('Google UK English Male')) ||
                         voices.find(v => v.name.includes('Daniel')) ||
                         voices.find(v => v.lang.includes('GB') && v.name.includes('Male')) ||
                         voices[0];

            if (voice) utterance.voice = voice;

            utterance.onstart = () => {
                log('Speaking: ' + text, 'info');
                updateStatus('Speaking...', 'info');
            };

            utterance.onend = () => {
                updateStatus('Ready', 'info');
            };

            synth.speak(utterance);
            addChat(text, 'jarvis');
        }

        function addChat(text, sender) {
            const chatArea = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.textContent = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function processManual() {
            const input = document.getElementById('textInput');
            const text = input.value.trim();
            if (!text) return;
            addChat(text, 'user');
            processCommand(text);
            input.value = '';
        }

        function updateStatus(text, type) {
            const status = document.getElementById('statusText');
            status.textContent = text;
            status.className = 'status-text ' + type;
        }

        function testSpeech() {
            speak('Voice synthesis test successful. JARVIS is online.');
        }

        // Load voices
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => {
                const voices = speechSynthesis.getVoices();
                log(`Loaded ${voices.length} voices`, 'info');
            };
        }
    </script>
</body>
</html>
